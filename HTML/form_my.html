<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <fieldset>
            <table cellspacing="5px"cellpadding="1px">
                <tr>
                    <td>
                        <label for="firstname">First Name:</label>
                    </td>
                    <td>
                        <input type="text" id="firstname">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="lastname">Last Name:</label>
                    </td>
                    <td>
                        <input type="text" id="lastname">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="dateofbirth">Date Of Birth:</label>
                    </td>
                    <td>
                        <input type="Date" id="dateofbirth">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="gender">Gender: </label>
                    </td>
                    <td>
                        <input type="radio" id="gender">Male
                        <input type="radio" id="gender">Female
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="emailid">Email id:</label>
                    </td>
                    <td>
                        <input type="email" id="emailid">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="mobileno">Mobile No:</label>
                    </td>
                    <td>
                        <input type="tel" id="mobileno">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="address">Address:</label>
                    </td>
                    <td>
                        <textarea name="address" id="address"></textarea>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="city">City:</label>
                    </td>
                    <td>
                        <input type="text" id="city">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="pincode">Pincode:</label>
                    </td>
                    <td>
                        <input type="number" id="pincode">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="state">State:</label>
                    </td>
                    <td>
                        <input type="text" id="state">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="country">Country:</label>
                    </td>
                    <td>
                        <input type="text" id="country">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="hobbies">Hobbies:</label>
                    </td>
                    <td>
                        <input type="checkbox" id="drawing">
                        <label for="drawing">drawing</label>
                        <input type="checkbox" id="singing">
                        <label for="singing">singing</label>
                        <input type="checkbox" id="dancing">
                        <label for="dancing">Dancing</label>
                        <br>
                        <input type="checkbox" id="other">
                        <label for="other">Other</label>
                        <input type="text" id="other">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="qualification">Qualifications</label>
                    </td>
                    <td>
                        <table  cellpadding="1px" cellspacing="5px">
                            <tr>
                                <td><b><label for="slno">sl no</label></b></td>
                                <td><b><label for="qualification">Qualification</label></b></td>
                                <td><b><label for="yearofpassing">Year of Passing</label></b></td>
                                <td><b><label for="percentage">Percentage</label></b></td>
                             </tr>
                            <tr>
                                 <td>1</td>
                                <td><input type="text" id="qualification"></td>
                                <td><input type="text" id="yearofpassing"></td>
                                <td><input type="text" id="percentage"></td>
                            </tr>
                            <tr>
                                 <td>2</td>
                                <td><input type="text" id="qualification"></td>
                                <td><input type="text" id="yearofpassing"></td>
                                <td><input type="text" id="percentage"></td>
                            </tr>
                            <tr>
                                <td>3</td>
                                <td><input type="text" id="qualification"></td>
                                <td><input type="text" id="yearofpassing"></td>
                                <td><input type="text" id="percentage"></td>
                            </tr>
                            <tr>
                                <td>4</td>
                                <td><input type="text" id="qualification"></td>
                                <td><input type="text" id="yearofpassing"></td>
                                <td><input type="text" id="percentage"></td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="courses">Cources: </label>
                    </td>
                    <td>
                        <input type="radio" id="courses">B.Tech
                        <input type="radio" id="courses">B.Com
                        <input type="radio" id="courses">BSC
                    </td>
                </tr>
                <br><br>
                <tr>
                    <td>
                        <button>Submit</button>
                        <button>Reset</button>
                    </td>
                </tr>
            </table>
        </fieldset>
    </form>
</body>
</html>
