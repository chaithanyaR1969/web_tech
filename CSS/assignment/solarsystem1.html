<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Solar System</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at center, #000 40%, #020d1f 100%);
        overflow: hidden;
    }

    .solar-system {
        position: relative;
        width: 600px;
        height: 600px;
    }

    .sun {
        position: absolute;
        width: 120px;
        height: 120px;
        background: radial-gradient(circle, #ffdd00, #ff9900, #ff5500);
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 60px #ff9900;
    }

    .orbit {
        position: absolute;
        border: 1px dashed rgba(255,255,255,0.2);
        border-radius: 50%;
        animation: rotate linear infinite;
    }

    .planet {
        position: absolute;
        border-radius: 50%;
        top: 50%;
        left: 100%;
        transform: translate(-50%, -50%);
    }

    /* Mercury */
    .mercury-orbit {
        width: 180px;
        height: 180px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation-duration: 4s;
    }
    .mercury {
        width: 10px;
        height: 10px;
        background: gray;
    }

    /* Venus */
    .venus-orbit {
        width: 240px;
        height: 240px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation-duration: 7s;
    }
    .venus {
        width: 14px;
        height: 14px;
        background: orange;
    }

    /* Earth */
    .earth-orbit {
        width: 300px;
        height: 300px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation-duration: 10s;
    }
    .earth {
        width: 16px;
        height: 16px;
        background: dodgerblue;
    }

    /* Mars */
    .mars-orbit {
        width: 360px;
        height: 360px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation-duration: 15s;
    }
    .mars {
        width: 12px;
        height: 12px;
        background: red;
    }

    @keyframes rotate {
        from { transform: translate(-50%, -50%) rotate(0deg); }
        to { transform: translate(-50%, -50%) rotate(360deg); }
    }

</style>
</head>

<body>

<div class="solar-system">
    <div class="sun"></div>

    <div class="orbit mercury-orbit">
        <div class="planet mercury"></div>
    </div>

    <div class="orbit venus-orbit">
        <div class="planet venus"></div>
    </div>

    <div class="orbit earth-orbit">
        <div class="planet earth"></div>
    </div>

    <div class="orbit mars-orbit">
        <div class="planet mars"></div>
    </div>
</div>

</body>
</html>
