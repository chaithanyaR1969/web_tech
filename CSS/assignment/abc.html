<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System Animation</title>

<style>

/* Background with stars */
body{
    margin:0;
    height:100vh;
    background:black;
    overflow:hidden;
}

/* Random star effect */
body::before{
    content:"";
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    box-shadow:
    50px 100px white, 200px 300px white, 400px 150px white,
    600px 500px white, 800px 200px white, 1000px 350px white,
    1200px 600px white, 300px 700px white, 900px 700px white,
    700px 100px white, 1100px 150px white, 500px 600px white;
}

/* Center system */
.solar-system{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

/* Sun */
.sun{
    position:absolute;
    width:120px;
    height:120px;
    background:gold;
    border-radius:50%;
    box-shadow:0 0 60px gold;
}

/* Orbit common */
.orbit{
    position:absolute;
    border:1px solid rgba(255,255,255,0.2);
    border-radius:50%;
    animation:rotate linear infinite;
}

/* Planet common */
.planet{
    position:absolute;
    top:-8px;
    left:50%;
    transform:translateX(-50%);
    border-radius:50%;
}

/* Mercury */
.mercury-orbit{ width:170px; height:170px; animation-duration:4s;}
.mercury{ width:10px; height:10px; background:gray; }

/* Venus */
.venus-orbit{ width:220px; height:220px; animation-duration:7s;}
.venus{ width:14px; height:14px; background:orange; }

/* Earth */
.earth-orbit{ width:270px; height:270px; animation-duration:10s;}
.earth{ width:16px; height:16px; background:deepskyblue; }

/* Mars */
.mars-orbit{ width:320px; height:320px; animation-duration:13s;}
.mars{ width:14px; height:14px; background:red; }

/* Jupiter */
.jupiter-orbit{ width:390px; height:390px; animation-duration:18s;}
.jupiter{ width:28px; height:28px; background:burlywood; }

/* Saturn */
.saturn-orbit{ width:460px; height:460px; animation-duration:22s;}
.saturn{ width:24px; height:24px; background:khaki; }

/* Uranus */
.uranus-orbit{ width:520px; height:520px; animation-duration:26s;}
.uranus{ width:18px; height:18px; background:lightblue; }

/* Neptune */
.neptune-orbit{ width:580px; height:580px; animation-duration:30s;}
.neptune{ width:18px; height:18px; background:blue; }

/* Pluto */
.pluto-orbit{ width:630px; height:630px; animation-duration:36s;}
.pluto{ width:8px; height:8px; background:white; }

/* Rotation animation */
@keyframes rotate{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

</style>
</head>

<body>

<div class="solar-system">

<div class="sun"></div>

<div class="orbit mercury-orbit"><div class="planet mercury"></div></div>
<div class="orbit venus-orbit"><div class="planet venus"></div></div>
<div class="orbit earth-orbit"><div class="planet earth"></div></div>
<div class="orbit mars-orbit"><div class="planet mars"></div></div>
<div class="orbit jupiter-orbit"><div class="planet jupiter"></div></div>
<div class="orbit saturn-orbit"><div class="planet saturn"></div></div>
<div class="orbit uranus-orbit"><div class="planet uranus"></div></div>
<div class="orbit neptune-orbit"><div class="planet neptune"></div></div>
<div class="orbit pluto-orbit"><div class="planet pluto"></div></div>

</div>

</body>
</html>
