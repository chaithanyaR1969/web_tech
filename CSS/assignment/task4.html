<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: bolder;
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
            background-color:powderblue;
            display: flex;
            justify-content: center;
            align-items: center;
            border-color: black;
            border: 10px;
        }
        form{
            background-color: white;
            border: 2px solid black;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0px 0px 5px rgb(0, 0, 0,0.86);
        }
        #user-label{
            padding: 10px;  
            margin: 10px;
        }
        #pass-label{
            padding: 10px;
            margin: 10px;
        }
        #button{
            margin: 10px;
            padding: 5px;
            border-radius: 5px;
            display: flex;               
            justify-content: space-evenly; 
            align-items: center;
        }
        #username,#password{
            border-radius: 5px;
            padding: 5px 15px;
        }
        .btn-login,.btn-cancel{
            padding: 10px 40px;
            background-color:yellow;
            border-radius: 5px;
            border: none;
            box-shadow: 0px 0px 1px rgb(0, 0, 0,0.86);
        }
        
    </style>
</head>
<body>
    <div id="field-setting">
        <form action="">
            <div id="user-label">
                <label for="username">USERNAME</label>
                <input type="text" id="username" placeholder="username">
            </div>
            <div id="pass-label">
                <label for="password">PASSWORD</label>
                <input type="text" id="password" placeholder="password">
            </div>
            <div id="button">
                <button class="btn-login">LOGIN</button>
                <BUtton class="btn-cancel">CANCEL</BUtton>
            </div>
        </form>
    </div>
</body>
</html>
