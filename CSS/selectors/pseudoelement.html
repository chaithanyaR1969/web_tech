<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1::after{
            content: " priyanka ";
        }
        h1::before{
            content: " vinayaka ";
        }
        h1::first-letter{
            color:red;
        }
        h1::first-line{
            color:yellow;
        }
        li::marker{
            content: "😊";
        }
        li::selection{
            background-color: yellow;
            color:red;
        }
    </style>
</head>
<body>
    <h1>weds</h1>
    <ul>
        <li>food</li>
        <li>dress</li>
        <li>ornament</li>
        <li>makeup</li>
    </ul>
</body>
</html>
